<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daftar – Analisis Sentimen</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans','sans-serif'] } } } }</script>
</head>
<body class="font-sans min-h-screen flex bg-gray-50">

<!-- Left Panel -->
<div class="hidden md:flex w-[45%] bg-gradient-to-br from-blue-900 via-blue-600 to-blue-400 flex-col justify-center px-14 py-16 text-white relative overflow-hidden">
  <div class="absolute -top-20 -right-20 w-80 h-80 rounded-full bg-white/5"></div>
  <div class="absolute -bottom-16 -left-16 w-64 h-64 rounded-full bg-white/5"></div>
  
  <h1 class="text-4xl font-extrabold leading-tight mb-5">Buat Akun<br/>Sekarang</h1>
  <p class="text-base opacity-80 leading-relaxed mb-12 max-w-sm">
    Daftarkan akun untuk menggunakan fitur analisis sentimen wisata pantai.
  </p>
  
</div>

<!-- Right Panel -->
<div class="flex-1 flex items-center justify-center px-8 py-10">
  <div class="w-full max-w-md">
    <div class="mb-8">
      <h2 class="text-3xl font-extrabold tracking-tight mb-2">Buat Akun Baru</h2>
      <p class="text-gray-500 text-sm">Isi form berikut untuk mendaftar sebagai pengguna</p>
    </div>

    {% if error %}
    <div class="flex items-center gap-2 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm mb-5">
      <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.register') }}" class="space-y-5">

      <!-- Nama -->
      <div>
        <label class="block text-sm font-semibold mb-1.5">Nama Lengkap</label>
        <div class="relative">
          <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"
               fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
          <input type="text" name="name" placeholder="Nama lengkap Anda"
                 value="{{ request.form.get('name','') }}" required
                 class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-lg text-sm outline-none
                        focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition"/>
        </div>
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm font-semibold mb-1.5">Alamat Email</label>
        <div class="relative">
          <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"
               fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" name="email" placeholder="contoh@email.com"
                 value="{{ request.form.get('email','') }}" required
                 class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-lg text-sm outline-none
                        focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition"/>
        </div>
      </div>

      <!-- Password -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-semibold mb-1.5">Password</label>
          <div class="relative">
            <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"
                 fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" name="password"
                   placeholder="Min. 8 karakter" required
                   oninput="checkStrength(this.value)"
                   class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-lg text-sm outline-none
                          focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition"/>
          </div>
          <div class="flex gap-1 mt-1.5">
            <div id="b1" class="h-1 flex-1 rounded bg-gray-200 transition-colors"></div>
            <div id="b2" class="h-1 flex-1 rounded bg-gray-200 transition-colors"></div>
            <div id="b3" class="h-1 flex-1 rounded bg-gray-200 transition-colors"></div>
            <div id="b4" class="h-1 flex-1 rounded bg-gray-200 transition-colors"></div>
          </div>
          <p id="pwHint" class="text-[11px] text-gray-400 mt-0.5">Minimal 8 karakter</p>
        </div>
        <div>
          <label class="block text-sm font-semibold mb-1.5">Konfirmasi</label>
          <div class="relative">
            <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"
                 fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" name="confirm_password"
                   placeholder="Ulangi password" required
                   class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-lg text-sm outline-none
                          focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition"/>
          </div>
        </div>
      </div>

      <button type="submit"
              class="w-full py-3 bg-blue-600 hover:bg-blue-700 active:scale-[.99] text-white font-bold rounded-lg text-sm transition">
        Daftar Sekarang
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-5">
      Sudah punya akun?
      <a href="{{ url_for('auth.login') }}" class="text-blue-600 font-semibold hover:underline">Masuk di sini</a>
    </p>
  </div>
</div>

<script>
  const bars   = ['b1','b2','b3','b4'].map(id => document.getElementById(id));
  const colors = { 1:'bg-red-400', 2:'bg-yellow-400', 3:'bg-yellow-400', 4:'bg-green-500' };
  const labels = { 0:'Minimal 8 karakter', 1:'Lemah', 2:'Sedang', 3:'Kuat', 4:'Sangat Kuat' };

  function checkStrength(v) {
    let s = 0;
    if (v.length >= 8) s++;
    if (/[A-Z]/.test(v)) s++;
    if (/[0-9]/.test(v)) s++;
    if (/[^A-Za-z0-9]/.test(v)) s++;
    bars.forEach((b, i) => {
      b.className = 'h-1 flex-1 rounded transition-colors ' + (i < s ? colors[s] : 'bg-gray-200');
    });
    document.getElementById('pwHint').textContent = labels[s] || labels[0];
  }
</script>
</body>
</html>
