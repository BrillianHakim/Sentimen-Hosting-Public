<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lupa Password – Analisis Sentimen</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans','sans-serif'] } } } }</script>
</head>
<body class="font-sans min-h-screen flex bg-gray-50">

<!-- Left Panel -->
<div class="hidden md:flex w-[45%] bg-gradient-to-br from-blue-900 via-blue-600 to-blue-400 flex-col justify-center px-14 py-16 text-white relative overflow-hidden">
  <div class="absolute -top-20 -right-20 w-80 h-80 rounded-full bg-white/5"></div>
  <div class="absolute -bottom-16 -left-16 w-64 h-64 rounded-full bg-white/5"></div>
  <p class="text-xl font-extrabold mb-16">Analisis Sentimen</p>
  <h1 class="text-4xl font-extrabold leading-tight mb-5">Reset<br/>Password</h1>
  <p class="text-base opacity-80 leading-relaxed max-w-sm">
    Masukkan email terdaftar dan buat password baru untuk akun Anda.
  </p>
</div>

<!-- Right Panel -->
<div class="flex-1 flex items-center justify-center px-8 py-10">
  <div class="w-full max-w-md">

    <div class="mb-8">
      <h2 class="text-3xl font-extrabold tracking-tight mb-2">Lupa Password</h2>
      <p class="text-gray-500 text-sm">Isi form berikut untuk mengatur ulang password</p>
    </div>

    {% if success %}
    <div class="flex items-center gap-2 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg text-sm mb-5">
      <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
      {{ success }}
    </div>
    <a href="{{ url_for('auth.login') }}"
       class="block w-full text-center py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg text-sm transition">
      Ke Halaman Login
    </a>

    {% else %}

    {% if error %}
    <div class="flex items-center gap-2 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm mb-5">
      <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.forgot_password') }}" class="space-y-5">

      <!-- Email -->
      <div>
        <label class="block text-sm font-semibold mb-1.5">Alamat Email</label>
        <div class="relative">
          <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"
               fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" name="email" placeholder="Email terdaftar"
                 value="{{ request.form.get('email','') }}" required
                 class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-lg text-sm outline-none
                        focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition"/>
        </div>
      </div>

      <!-- Password Baru -->
      <div>
        <label class="block text-sm font-semibold mb-1.5">Password Baru</label>
        <div class="relative">
          <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"
               fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="new_password" name="new_password"
                 placeholder="Min. 8 karakter" required
                 class="w-full pl-10 pr-10 py-2.5 border border-gray-200 rounded-lg text-sm outline-none
                        focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition"/>
          <button type="button" onclick="togglePw('new_password')"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-blue-600">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Konfirmasi Password -->
      <div>
        <label class="block text-sm font-semibold mb-1.5">Konfirmasi Password Baru</label>
        <div class="relative">
          <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"
               fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="confirm_password" name="confirm_password"
                 placeholder="Ulangi password baru" required
                 class="w-full pl-10 pr-10 py-2.5 border border-gray-200 rounded-lg text-sm outline-none
                        focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition"/>
          <button type="button" onclick="togglePw('confirm_password')"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-blue-600">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit"
              class="w-full py-3 bg-blue-600 hover:bg-blue-700 active:scale-[.99] text-white font-bold rounded-lg text-sm transition">
        Reset Password
      </button>
    </form>

    {% endif %}

    <p class="text-center text-sm text-gray-400 mt-6">
      <a href="{{ url_for('auth.login') }}" class="text-blue-600 font-semibold hover:underline">← Kembali ke Login</a>
    </p>

  </div>
</div>

<script>
  function togglePw(id) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }
</script>
</body>
</html>
